replicaCount: 1

image:
  repository: ghcr.io/it-top-ai-bot/ai-executor
  pullPolicy: Always
  tag: "latest"

ingress:
  enabled: false

config:
  s3Bucket: "homeworks-solutions-dev"
  homeworkDownloadAllowedHosts: "localhost,127.0.0.1,*.top-academy.ru,s3.actimate.ru"
  configServer:
    host: "config-server.infra.svc.cluster.local"
    port: "8080"
  otel:
    endpoint: "http://192.168.0.160:4318"

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    memory: "2Gi"
