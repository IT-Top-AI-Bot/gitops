replicaCount: 1

image:
  repository: ghcr.io/it-top-ai-bot/config-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

service:
  type: ClusterIP
  port: 8888

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    memory: "512Mi"

config:
  springProfile: "dev,kubernetes"
  serverPort: "8888"
  adminServer:
    url: "http://admin-server-dev.dev.svc.cluster.local:8090"
    serviceBaseUrl: "http://config-server-dev.dev.svc.cluster.local:8888"
  otel:
    endpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"

vault:
  secretPath: "dev/config-server"

secretStore:
  name: "vault-backend"
  kind: "SecretStore"
