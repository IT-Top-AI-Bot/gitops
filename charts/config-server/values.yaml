replicaCount: 1

image:
  repository: ghcr.io/it-top-ai-bot/config-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

config:
  springProfile: "dev,kubernetes"
  serverPort: "8080"
  otel:
    endpoint: "http://192.168.0.160:4318"

vault:
  secretPath: "dev/config-server"

secretStore:
  name: "vault-backend"
  kind: "SecretStore"

networkPolicy:
  enabled: false
  allowedNamespaces: [ ]
