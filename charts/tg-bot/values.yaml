replicaCount: 1

image:
  repository: ghcr.io/it-top-ai-bot/tg-bot
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    memory: "512Mi"

config:
  springProfile: "dev,kubernetes"
  serverPort: "8080"
  backendBaseUrl: "http://api-gateway-dev.dev.svc.cluster.local:8080"
  webhookHost: "https://dev-bot.actimate.ru"
  proxyHost: ""
  proxyPort: "0"
  configServer:
    host: "config-server"
    port: "8888"
  otel:
    endpoint: "http://192.168.0.160:4318"

vault:
  secretPath: "dev/tg-bot"

secretStore:
  name: "vault-backend"
  kind: "SecretStore"
