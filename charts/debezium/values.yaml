replicaCount: 1

image:
  repository: debezium/connect
  pullPolicy: IfNotPresent
  tag: "3.0.0.Final"

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    memory: "1Gi"

# Kafka bootstrap servers — not a secret, set directly per environment
kafkaBootstrapServers: ""

# Kafka Connect worker topic names
kafka:
  groupId: "debezium-journal"
  configStorageTopic: "debezium-journal-configs"
  offsetStorageTopic: "debezium-journal-offsets"
  statusStorageTopic: "debezium-journal-statuses"

# Non-sensitive Debezium connector config
connector:
  pluginName: pgoutput
  slotName: journal_outbox_slot
  publicationName: journal_outbox_pub
  topicPrefix: journal
  tableIncludeList: "public.outbox_event"
  outboxTopicReplacement: "homework-execution"
  snapshotMode: initial
  heartbeatIntervalMs: "10000"

# Vault secret path for sensitive values:
# DATABASE_HOST, DATABASE_PORT, DATABASE_NAME, DATABASE_USER, DATABASE_PASSWORD
vault:
  secretPath: "dev/debezium"

secretStore:
  name: "vault-backend"
  kind: "SecretStore"
