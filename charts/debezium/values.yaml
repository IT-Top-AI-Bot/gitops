replicaCount: 1

image:
  repository: quay.io/debezium/server
  pullPolicy: IfNotPresent
  tag: "3.0"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    memory: "512Mi"

# Kafka bootstrap servers — not a secret, set directly per environment
kafkaBootstrapServers: ""

# Non-sensitive Debezium source config
connector:
  # PostgreSQL source
  pluginName: pgoutput
  slotName: debezium_journal_dev
  publicationName: debezium_journal_dev_pub
  topicPrefix: journal
  tableIncludeList: "public.homework_execution"
  snapshotMode: initial
  heartbeatIntervalMs: "10000"

  # Kafka offset storage (survives pod restarts)
  offsetStorageTopic: debezium.offsets.journal.dev

# Vault secret path for sensitive values:
# DATABASE_HOST, DATABASE_PORT, DATABASE_NAME, DATABASE_USER, DATABASE_PASSWORD
vault:
  secretPath: "dev/debezium"

secretStore:
  name: "vault-backend"
  kind: "SecretStore"
