replicaCount: 1

image:
  repository: ghcr.io/it-top-ai-bot/api-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    memory: "512Mi"

config:
  springProfile: "dev,kubernetes"
  serverPort: "8080"
  configServer:
    host: "config-server-dev.dev.svc.cluster.local"
    port: "8080"
  otel:
    endpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"

vault:
  secretPath: "dev/api-gateway"

secretStore:
  name: "vault-backend"
  kind: "SecretStore"
