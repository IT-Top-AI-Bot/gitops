replicaCount: 1

image:
  repository: ghcr.io/YOUR_ORG/journal-service
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "traefik"   # k3s default ingress
  host: "journal.YOUR_DOMAIN"
  tls: false

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

# Нечувствительная конфигурация приложения
config:
  springProfile: "dev"
  serverPort: "8080"
  redis:
    host: "redis-master.dev.svc.cluster.local"
    port: "6379"
  journal:
    baseUrl: "https://YOUR_JOURNAL_API_URL"
    syncInterval: "3600000"

# Путь к секретам в Vault (KV v2 mount: secret)
# Итоговый путь: secret/data/dev/journal-service
vault:
  secretPath: "dev/journal-service"

# Имя SecretStore из dev-infra chart
secretStore:
  name: "vault-backend"
  kind: "SecretStore"
