replicaCount: 1

image:
  repository: ghcr.io/it-top-ai-bot/journal-service
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: "traefik"
  host: ""
  tls: false

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# Нечувствительная конфигурация приложения
config:
  springProfile: "dev,kubernetes"
  serverPort: "8080"
  journal:
    baseUrl: "https://msapi.top-academy.ru/api/v2"
    syncInterval: "3600000"
  configServer:
    host: "config-server.infra.svc.cluster.local"
    port: "8080"
  otel:
    endpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"

# Путь к секретам в Vault (KV v2 mount: secret)
# Итоговый путь: secret/data/dev/journal-service
vault:
  secretPath: "dev/journal-service"

# Имя SecretStore из dev-infra chart
secretStore:
  name: "vault-backend"
  kind: "SecretStore"
