context:
  argocdUrl: "https://argocd.example.com"
  environment: "shared"

serviceAccount:
  create: false
  name: "external-secrets"

vault:
  address: ""
  mountPath: "secret"
  kubernetesMountPath: "kubernetes"
  role: ""
  secretPath: "shared/argocd-notifications"

secretStore:
  create: false
  name: "vault-backend"
  kind: "SecretStore"

services:
  telegram:
    enabled: false
    secretName: "argocd-notifications-secret"
    tokenSecretKey: "telegram-token"
    vaultProperty: "TELEGRAM_TOKEN"
    refreshInterval: "1h"

defaultTriggers:
  - on-deployed
  - on-health-degraded
  - on-sync-failed
  - on-sync-status-unknown

subscriptions: [ ]
# Example:
# subscriptions:
#   - recipients:
#       - "telegram:-1001234567890"
#     triggers:
#       - on-deployed
#       - on-sync-failed
#       - on-health-degraded
#     selector: "notifications=enabled"
