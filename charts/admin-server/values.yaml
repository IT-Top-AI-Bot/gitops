replicaCount: 1

image:
  repository: ghcr.io/it-top-ai-bot/admin-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-credentials

service:
  type: ClusterIP
  port: 8090

ingress:
  enabled: false
  className: "traefik"
  host: ""
  tls: false

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    memory: "512Mi"

config:
  springProfile: "dev"
  serverPort: "8090"
  otel:
    endpoint: "http://otel-collector.monitoring.svc.cluster.local:4318"
