apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: { { .Release.Namespace } }
  annotations:
    # Vault Kubernetes auth использует токен этого ServiceAccount
    # для аутентификации с ролью {{ .Values.vault.role }}
    vault.hashicorp.com/role: { { .Values.vault.role | quote } }
